title: Pool Management
views:
  - title: Pool
    icon: mdi:pool
    cards:
      - type: vertical-stack
        cards:
          # ── Header ──────────────────────────────────────────────────────
          - type: markdown
            content: >
              # 🏊 Pool Pump Manager
              Intelligente Steuerung der Poolpumpe mit Messwertüberwachung.

          # ── Automatik & Status ──────────────────────────────────────────
          - type: horizontal-stack
            cards:
              - type: tile
                entity: switch.pool_pump_manager_automation_enabled
                name: Automatik
                icon: mdi:robot
                color: green
                tap_action:
                  action: toggle

              - type: tile
                entity: binary_sensor.pool_pump_manager_running
                name: Pumpe läuft
                icon: mdi:pump
                color: blue

              - type: tile
                entity: binary_sensor.pool_pump_manager_warning
                name: Warnung
                icon: mdi:alert-circle
                color: red

          # ── Status & Nächster Start ─────────────────────────────────────
          - type: horizontal-stack
            cards:
              - type: tile
                entity: sensor.pool_pump_manager_status
                name: Status
                icon: mdi:pool

              - type: tile
                entity: sensor.pool_pump_manager_next_start
                name: Nächster Start
                icon: mdi:clock-start

          # ── Messwerte (HM-ES-PMSw1-Pl-DN-R1) ──────────────────────────
          - type: entities
            title: Aktuelle Messwerte
            entities:
              - entity: sensor.pool_pump_manager_power
                name: Leistung
                icon: mdi:lightning-bolt
              - entity: sensor.pool_pump_manager_energy
                name: Energie (Gesamt)
                icon: mdi:counter
              - entity: sensor.pool_pump_manager_voltage
                name: Spannung
                icon: mdi:sine-wave
              - entity: sensor.pool_pump_manager_current
                name: Strom
                icon: mdi:current-ac
              - entity: sensor.pool_pump_manager_frequency
                name: Frequenz
                icon: mdi:waveform

          # ── Laufzeiten ──────────────────────────────────────────────────
          - type: entities
            title: Laufzeiten
            entities:
              - entity: sensor.pool_pump_manager_runtime_today
                name: Laufzeit heute
                icon: mdi:timer-outline
              - entity: sensor.pool_pump_manager_target_runtime
                name: Ziel-Laufzeit
                icon: mdi:target
              - entity: sensor.pool_pump_manager_remaining_runtime
                name: Restlaufzeit
                icon: mdi:timer-sand
              - entity: number.pool_pump_manager_daily_runtime_hours
                name: Laufzeit manuell überschreiben
                icon: mdi:timer-cog-outline

          # ── Statistik ───────────────────────────────────────────────────
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.pool_pump_manager_efficiency
                name: Tageseffizienz
                min: 0
                max: 100
                unit: "%"
                needle: true
                severity:
                  green: 80
                  yellow: 50
                  red: 0

              - type: gauge
                entity: sensor.pool_pump_manager_power
                name: Leistung
                min: 0
                max: 800
                unit: W
                needle: true
                severity:
                  green: 400
                  yellow: 600
                  red: 700

          # ── Verlauf Leistung ────────────────────────────────────────────
          - type: history-graph
            title: Leistung (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.pool_pump_manager_power
                name: Leistung

          # ── Aktionen ────────────────────────────────────────────────────
          - type: entities
            title: Aktionen
            entities:
              - type: button
                name: Jetzt starten
                icon: mdi:play-circle
                tap_action:
                  action: perform-action
                  perform_action: pool_pump_manager.start_now
              - type: button
                name: Jetzt stoppen
                icon: mdi:stop-circle
                tap_action:
                  action: perform-action
                  perform_action: pool_pump_manager.stop_now
              - type: button
                name: Laufzeit zurücksetzen
                icon: mdi:restart
                tap_action:
                  action: perform-action
                  perform_action: pool_pump_manager.reset_runtime_today
              - type: button
                name: Zeitplan neu berechnen
                icon: mdi:calculator
                tap_action:
                  action: perform-action
                  perform_action: pool_pump_manager.force_recalculate
